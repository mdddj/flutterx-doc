name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SITE_URL: ${{ vars.DOCKER_SITE_URL || 'https://docs.example.com/' }}
  ALT_LINK_ZH: ${{ vars.DOCKER_ALT_LINK_ZH || '/zh/' }}
  ALT_LINK_EN: ${{ vars.DOCKER_ALT_LINK_EN || '/en/' }}
  ALT_LINK_JA: ${{ vars.DOCKER_ALT_LINK_JA || '/ja/' }}

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SITE_URL=${{ env.SITE_URL }}
            ALT_LINK_ZH=${{ env.ALT_LINK_ZH }}
            ALT_LINK_EN=${{ env.ALT_LINK_EN }}
            ALT_LINK_JA=${{ env.ALT_LINK_JA }}
